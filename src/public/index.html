<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/calendar.css">
  <link rel="stylesheet" href="/css/voice.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">🎙 Voice Calendar</span>
      </div>
      <div class="topbar-center">
        <div class="view-switcher">
          <button class="view-btn active" data-view="month" data-i18n="monthView">月</button>
          <button class="view-btn" data-view="week" data-i18n="weekView">周</button>
          <button class="view-btn" data-view="day" data-i18n="dayView">日</button>
        </div>
      </div>
      <div class="topbar-right">
        <select id="langSelect" class="lang-select">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
          <option value="ja-JP">日本語</option>
        </select>
        <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
        <button id="settingsBtn" class="icon-btn" title="Settings">⚙</button>
      </div>
    </header>

    <main class="main-content">
      <div class="calendar-area">
        <div class="calendar-header">
          <button id="prevBtn" class="nav-btn">◀</button>
          <h2 id="calendarTitle" class="calendar-title"></h2>
          <button id="nextBtn" class="nav-btn">▶</button>
          <button id="todayBtn" class="today-btn" data-i18n="today">今天</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <aside class="side-panel">
        <div class="voice-section">
          <div id="voiceBtn" class="voice-btn" role="button" tabindex="0">
            <div class="voice-btn-inner">
              <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </div>
            <div class="voice-rings"></div>
          </div>
          <p id="voiceHint" class="voice-hint" data-i18n="holdToSpeak">按住说话</p>
          <div id="voiceResult" class="voice-result hidden">
            <p class="voice-text" id="voiceText"></p>
          </div>
        </div>

        <div id="parseCard" class="parse-card hidden">
          <div class="parse-header">
            <span id="parseIntent" class="parse-intent"></span>
          </div>
          <div class="parse-body" id="parseBody"></div>
          <div class="parse-actions">
            <button id="parseConfirm" class="btn btn-primary" data-i18n="confirm">确认</button>
            <button id="parseCancel" class="btn btn-secondary" data-i18n="cancel">取消</button>
          </div>
        </div>

        <div id="candidateCard" class="candidate-card hidden">
          <h3 class="candidate-title" data-i18n="selectEvent">请选择要操作的事件</h3>
          <ul id="candidateList" class="candidate-list"></ul>
        </div>

        <div class="events-section">
          <h3 class="section-title" data-i18n="todaySchedule">📋 今日安排</h3>
          <ul id="eventList" class="event-list"></ul>
          <p id="noEvents" class="no-events hidden" data-i18n="noEvents">暂无安排</p>
        </div>
      </aside>
    </main>

    <div id="eventModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h3 class="modal-title" data-i18n="eventDetail">事件详情</h3>
        <form id="eventForm">
          <div class="form-group">
            <label data-i18n="title">标题</label>
            <input type="text" id="formTitle" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="startTime">开始时间</label>
              <input type="datetime-local" id="formStart" required>
            </div>
            <div class="form-group">
              <label data-i18n="endTime">结束时间</label>
              <input type="datetime-local" id="formEnd">
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="description">描述</label>
            <textarea id="formDesc" rows="2"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="reminder">提醒</label>
              <select id="formReminder">
                <option value="0" data-i18n="noReminder">不提醒</option>
                <option value="5">5 min</option>
                <option value="15" selected>15 min</option>
                <option value="30">30 min</option>
                <option value="60">1 hour</option>
              </select>
            </div>
            <div class="form-group">
              <label data-i18n="color">颜色</label>
              <input type="color" id="formColor" value="#4A90D9">
            </div>
          </div>
          <input type="hidden" id="formEventId">
          <div class="modal-actions">
            <button type="submit" class="btn btn-primary" data-i18n="save">保存</button>
            <button type="button" id="formDelete" class="btn btn-danger hidden" data-i18n="delete">删除</button>
            <button type="button" id="formClose" class="btn btn-secondary" data-i18n="close">关闭</button>
          </div>
        </form>
      </div>
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content modal-sm">
        <h3 class="modal-title" data-i18n="settings">设置</h3>
        <div class="form-group">
          <label>AI API Base URL</label>
          <input type="text" id="settingApiBase" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-group">
          <label>AI API Key</label>
          <input type="password" id="settingApiKey" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label>AI Model</label>
          <input type="text" id="settingModel" placeholder="gpt-4o-mini">
        </div>
        <div class="modal-actions">
          <button id="settingsSave" class="btn btn-primary" data-i18n="save">保存</button>
          <button id="settingsClose" class="btn btn-secondary" data-i18n="close">关闭</button>
        </div>
      </div>
    </div>

    <footer class="statusbar">
      <span id="statusText" data-i18n="statusReady">就绪</span>
      <span id="reminderStatus"></span>
    </footer>
  </div>

  <script src="/js/i18n/zh-CN.js"></script>
  <script src="/js/i18n/en-US.js"></script>
  <script src="/js/i18n/ja-JP.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/tts.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/calendar-ui.js"></script>
  <script src="/js/event-panel.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
